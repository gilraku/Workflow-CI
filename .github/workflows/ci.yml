name: ML Workflow CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: MLProject

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            mlflow==2.19.0 \
            pandas==2.2.3 \
            numpy==2.1.3 \
            scikit-learn==1.5.2

      # Debug (boleh dihapus setelah workflow stabil)
      - name: Debug workspace
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Project structure:"
          ls -lah

          mkdir -p mlruns

          echo ""
          echo "After creating mlruns:"
          ls -lah

      - name: Run MLflow Project
        run: |
          mlflow run . \
            -e main \
            --env-manager=local \
            -P data_dir=adult_preprocessing

      - name: Get latest MLflow run ID
        id: get_run_id
        run: |
          python <<EOF
          import mlflow

          mlflow.set_tracking_uri("file:./mlruns")

          exp = mlflow.get_experiment_by_name("adult-income-classification")

          if exp is None:
              raise Exception("Experiment not found")

          runs = mlflow.search_runs(
              [exp.experiment_id],
              order_by=["start_time DESC"]
          )

          with open("${GITHUB_OUTPUT}", "a") as f:
              f.write(f"run_id={runs.iloc[0].run_id}\n")
          EOF

      - name: Commit MLflow artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          cd ..

          git add MLProject/mlruns

          git diff --cached --quiet && exit 0

          git commit -m "chore: update mlflow artifacts [skip ci]"

          git pull --rebase origin main

          git push origin HEAD:main

      - name: Build Docker image
        run: |
          mlflow models build-docker \
            --model-uri runs:/${{ steps.get_run_id.outputs.run_id }}/model \
            --name adult-income-model \
            --enable-mlserver

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag adult-income-model:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/adult-income-model:latest

          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/adult-income-model:latest