name: ML Workflow CI

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install MLflow project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas==2.2.3 numpy==2.1.3 scikit-learn==1.5.2

      - name: Run MLflow Project (retrain model)
        working-directory: MLProject
        run: |
          mlflow run . -e main --env-manager=local \
            --experiment-name adult-income-classification-ci \
            -P data_dir=adult_preprocessing

      - name: Get latest MLflow run ID
        working-directory: MLProject
        id: get_run_id
        run: |
          RUN_ID=$(python -c "
          import mlflow
          mlflow.set_tracking_uri('file:./mlruns')
          exp = mlflow.get_experiment_by_name('adult-income-classification-ci')
          runs = mlflow.search_runs([exp.experiment_id], order_by=['start_time DESC'])
          print(runs.iloc[0].run_id)
          ")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Latest run id: $RUN_ID"

      # ---- Skilled: simpan artefak hasil training ke repository GitHub ----
      - name: Commit MLflow artifacts to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns
          git diff --cached --quiet || git commit -m "chore: update MLflow run artifacts [skip ci]"
          git push

      # ---- Advance: build docker image dari model MLflow ----
      - name: Build Docker image from MLflow model
        working-directory: MLProject
        run: |
          mlflow models build-docker \
            --model-uri "runs:/${{ steps.get_run_id.outputs.run_id }}/model" \
            --name "adult-income-model" \
            --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push Docker image
        run: |
          docker tag adult-income-model:latest ${{ secrets.DOCKERHUB_USERNAME }}/adult-income-model:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/adult-income-model:latest
